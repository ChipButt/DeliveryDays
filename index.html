<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#dfe9e6" />
<title>Delivery Days</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#dfe9e6;touch-action:none;font-family:Arial,Helvetica,sans-serif}#wrap{height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:#dfe9e6}canvas{width:min(100vw,calc(100vh*390/844));height:min(100vh,calc(100vw*844/390));border-radius:18px;box-shadow:0 24px 80px rgba(30,40,45,.2);background:#eaf1ee;display:block}
</style>
</head>
<body><div id="wrap"><canvas id="game" width="390" height="844"></canvas></div>
<script>
(()=>{
const W=390,H=844,c=document.getElementById('game'),x=c.getContext('2d');let dpr=Math.min(2,devicePixelRatio||1);c.width=W*dpr;c.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0);
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(a,b,w,h,r){this.beginPath();this.moveTo(a+r,b);this.arcTo(a+w,b,a+w,b+h,r);this.arcTo(a+w,b+h,a,b+h,r);this.arcTo(a,b+h,a,b,r);this.arcTo(a,b,a+w,b,r);this.closePath();return this}}
const maps={easy:{n:'Gentle Coast',cash:220,roads:34,drv:3,late:8,spawn:.25,river:false},normal:{n:'Market County',cash:170,roads:25,drv:2,late:6,spawn:.36,river:true},hard:{n:'Bridge District',cash:130,roads:18,drv:2,late:5,spawn:.5,river:true}};
let screen='menu',G=null,tool='road',sel=null,msg='',msgT=0,P={x:0,y:0,down:false},ui=[];
const R=(a,b)=>a+Math.random()*(b-a),D=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),C=(v,a,b)=>Math.max(a,Math.min(b,v));
function node(t,n,px,py){return{id:Math.random().toString(36).slice(2),t,n,x:px,y:py,demand:0,due:0,drivers:0,free:0,round:false}}
function newGame(k){let m=maps[k],nodes=[node('hub','Central Hub',195,435),node('village','Oakmere',105,585),node('town','Ashford',287,618)];nodes[0].drivers=m.drv;nodes[0].free=m.drv;G={key:k,m,day:1,clock:0,cash:m.cash,roads:m.roads,bridges:m.river?1:0,rounds:1,late:0,score:0,nodes,links:[],trucks:[],paused:false};screen='play';tool='road';sel=null;say('Tap two places to build a road.')}
function say(t){msg=t;msgT=2.4}
function bg(){x.fillStyle='#eaf1ee';x.fillRect(0,0,W,H);x.strokeStyle='rgba(128,170,180,.23)';x.lineWidth=1;for(let i=-40;i<W+80;i+=52){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}for(let j=0;j<H;j+=52){x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke()}x.fillStyle='rgba(255,255,255,.35)';x.fillRect(0,0,W,H)}
function txt(t,px,py,s=18,col='#343a40',a='left',b=false){x.fillStyle=col;x.font=(b?'700 ':'500 ')+s+'px Arial';x.textAlign=a;x.textBaseline='middle';x.fillText(t,px,py)}
function wrap(t,px,py,w,s=15){x.font='500 '+s+'px Arial';x.fillStyle='#343a40';x.textAlign='center';let words=t.split(' '),line='',yy=py;for(let q of words){let z=line?line+' '+q:q;if(x.measureText(z).width>w&&line){x.fillText(line,px,yy);yy+=s+5;line=q}else line=z}if(line)x.fillText(line,px,yy)}
function btn(id,t,px,py,w,h,kind='teal'){x.fillStyle=kind==='dark'?'#343a40':kind==='red'?'#ef7067':'#95c2c4';x.roundRect(px,py,w,h,12);x.fill();txt(t,px+w/2,py+h/2,26,'#fff','center',true);ui.push({id,x:px,y:py,w,h})}
function icon(kind,px,py,on=false,badge=null){x.save();if(on){x.shadowColor='rgba(70,140,145,.55)';x.shadowBlur=16}x.fillStyle=on?'#95c2c4':'#343a40';x.beginPath();x.arc(px+26,py+26,26,0,7);x.fill();x.strokeStyle='#fff';x.lineWidth=4;x.lineCap='round';x.lineJoin='round';x.beginPath();if(kind==='road'){x.moveTo(px+16,py+36);x.lineTo(px+36,py+16);x.moveTo(px+18,py+27);x.lineTo(px+26,py+35);x.moveTo(px+26,py+19);x.lineTo(px+34,py+27)}if(kind==='driver'){x.arc(px+26,py+18,7,0,7);x.moveTo(px+15,py+40);x.quadraticCurveTo(px+26,py+27,px+37,py+40)}if(kind==='bridge'){x.moveTo(px+12,py+35);x.quadraticCurveTo(px+26,py+16,px+40,py+35);x.moveTo(px+14,py+35);x.lineTo(px+14,py+42);x.moveTo(px+38,py+35);x.lineTo(px+38,py+42)}if(kind==='round'){x.arc(px+26,py+26,13,0,7);x.moveTo(px+26,py+8);x.lineTo(px+30,py+16);x.moveTo(px+26,py+8);x.lineTo(px+22,py+16)}if(kind==='pause'){x.moveTo(px+20,py+16);x.lineTo(px+20,py+36);x.moveTo(px+32,py+16);x.lineTo(px+32,py+36)}x.stroke();x.restore();if(badge!==null){x.fillStyle='#f9f7ee';x.beginPath();x.arc(px+44,py+8,14,0,7);x.fill();x.strokeStyle='#343a40';x.lineWidth=3;x.stroke();txt(String(badge),px+44,py+9,14,'#343a40','center',true)}ui.push({id:'tool_'+kind,x:px,y:py,w:52,h:52})}
function logo(){x.fillStyle='#343a40';txt('Delivery Days',195,155,42,'#343a40','center',true);x.fillStyle='#ffcc73';x.beginPath();x.arc(315,138,8,0,7);x.fill();x.fillStyle='#ef7067';x.beginPath();x.arc(326,128,5,0,7);x.fill()}
function menu(){ui=[];bg();logo();wrap('Build roads, manage drivers, and survive as many delivery days as possible.',195,240,305,16);btn('easy','Gentle Coast',55,330,280,74);btn('normal','Market County',55,425,280,74);btn('hard','Bridge District',55,520,280,74);txt('Mobile prototype - raster canvas graphics only',195,770,13,'#5d666b','center')}
function river(){if(!G.m.river)return;x.save();x.strokeStyle='rgba(121,205,225,.75)';x.lineWidth=60;x.lineCap='round';x.beginPath();x.moveTo(340,-30);x.bezierCurveTo(290,120,370,240,310,360);x.bezierCurveTo(240,500,325,640,252,880);x.stroke();x.strokeStyle='rgba(63,165,195,.25)';x.lineWidth=66;x.stroke();x.restore()}
function roadCross(a,b){if(!G.m.river)return false;for(let i=0;i<18;i++){let t=i/17,px=a.x+(b.x-a.x)*t,py=a.y+(b.y-a.y)*t,rx=318-.085*py+42*Math.sin(py/100);if(Math.abs(px-rx)<34)return true}return false}
function roads(){G.links.forEach(r=>{let a=G.nodes.find(n=>n.id===r.a),b=G.nodes.find(n=>n.id===r.b);x.save();x.strokeStyle='rgba(0,0,0,.13)';x.lineWidth=r.bridge?24:18;x.lineCap='round';x.beginPath();x.moveTo(a.x+4,a.y+4);x.lineTo(b.x+4,b.y+4);x.stroke();x.strokeStyle='#fffef8';x.lineWidth=r.bridge?22:16;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();x.strokeStyle='rgba(149,194,196,.95)';x.lineWidth=3;x.setLineDash([10,12]);x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();x.restore()});if(sel){x.strokeStyle='#ef7067';x.lineWidth=4;x.beginPath();x.arc(sel.x,sel.y,39,0,7);x.stroke();if(P.down){x.strokeStyle='rgba(239,112,103,.5)';x.lineWidth=8;x.beginPath();x.moveTo(sel.x,sel.y);x.lineTo(P.x,P.y);x.stroke()}}}
function drawNode(n){let s=n.t==='hub'?62:n.t==='city'?58:n.t==='town'?54:50;x.save();x.translate(n.x,n.y);x.fillStyle=n.t==='hub'?'#ffcc73':n.t==='city'?'#ef7067':n.t==='town'?'#6c8ad6':'#72c982';x.shadowColor='rgba(0,0,0,.18)';x.shadowBlur=0;x.shadowOffsetX=8;x.shadowOffsetY=10;x.roundRect(-s/2,-s/2,s,s,13);x.fill();x.shadowColor='transparent';x.fillStyle='rgba(255,255,255,.7)';x.roundRect(-s/2+8,-s/2+8,s-16,s-16,9);x.fill();x.strokeStyle='#343a40';x.lineWidth=4;if(n.t==='hub'){x.beginPath();x.moveTo(-17,11);x.lineTo(17,11);x.lineTo(17,-10);x.lineTo(8,-18);x.lineTo(-17,-18);x.closePath();x.stroke()}else{x.beginPath();x.arc(0,-6,11,0,7);x.moveTo(0,5);x.lineTo(0,20);x.stroke()}if(n.round){x.beginPath();x.arc(0,0,34,0,7);x.stroke()}x.restore();if(n.demand>0){x.fillStyle=n.due<=2?'#ef7067':'#ffcc73';x.beginPath();x.arc(n.x+25,n.y-23,15,0,7);x.fill();x.strokeStyle='#fff';x.lineWidth=3;x.stroke();txt(n.demand,n.x+25,n.y-22,14,'#343a40','center',true)}txt(n.n,n.x,n.y+s/2+16,12,'#343a40','center',true);if(n.t==='hub')txt(n.free+'/'+n.drivers,n.x,n.y+s/2+31,12,'#5d666b','center')}
function hud(){x.fillStyle='rgba(250,249,244,.9)';x.roundRect(12,14,366,58,18);x.fill();txt('Day '+G.day,30,43,20,'#343a40','left',true);txt('£'+G.cash,112,43,18,'#343a40','left',true);txt('Road '+G.roads,190,43,17,'#343a40','left',true);txt('Late '+G.late+'/'+G.m.late,288,43,17,G.late>=G.m.late-2?'#ef7067':'#343a40','left',true);icon('pause',18,760,false);icon('road',88,760,tool==='road',G.roads);icon('driver',158,760,tool==='driver');icon('bridge',228,760,tool==='bridge',G.bridges);icon('round',298,760,tool==='round',G.rounds);if(msgT>0){x.fillStyle='rgba(55,61,67,.88)';x.roundRect(28,704,334,40,16);x.fill();txt(msg,195,725,14,'#fff','center',true)}}
function truck(v){let p=point(v);x.save();x.translate(p.x,p.y);x.rotate(p.a);x.fillStyle=['#ef7067','#6c8ad6','#72c982','#ffcc73'][v.col];x.roundRect(-17,-10,34,20,4);x.fill();x.fillStyle='#fff';x.fillRect(5,-7,8,7);x.fillStyle='#343a40';x.beginPath();x.arc(-9,10,4,0,7);x.arc(10,10,4,0,7);x.fill();x.restore()}
function play(dim=false){ui=[];bg();river();roads();G.nodes.forEach(drawNode);G.trucks.forEach(truck);hud();if(msg&&!dim&&msgT<=0){x.fillStyle='rgba(250,249,244,.82)';x.roundRect(25,84,340,43,16);x.fill();wrap(msg,195,105,300,13)}}
function over(){play(true);ui=[];x.fillStyle='rgba(234,241,238,.78)';x.fillRect(0,0,W,H);x.fillStyle='#f9f7ee';x.roundRect(35,220,320,260,18);x.fill();x.strokeStyle='#95c2c4';x.lineWidth=5;x.stroke();txt('Game Over',195,265,34,'#343a40','center',true);txt('Lasted '+G.day+' days',195,315,24,'#343a40','center',true);txt('Score '+G.score,195,352,22,'#343a40','center');let best=Math.max(+(localStorage.bestDD||0),G.score);localStorage.bestDD=best;txt('Best '+best,195,384,18,'#5d666b','center');btn('restart','Restart',65,510,260,74);btn('main','Main Menu',65,600,260,74,'dark')}
function hit(xp,yp){return ui.find(u=>xp>=u.x&&xp<=u.x+u.w&&yp>=u.y&&yp<=u.y+u.h)}function near(xp,yp){let b=null,bd=99;G.nodes.forEach(n=>{let dd=Math.hypot(n.x-xp,n.y-yp);if(dd<bd){bd=dd;b=n}});return bd<50?b:null}
function linked(a,b){return G.links.some(r=>(r.a===a.id&&r.b===b.id)||(r.a===b.id&&r.b===a.id))}function build(a,b){if(a.id===b.id)return say('Choose two different places.');if(linked(a,b))return say('That road already exists.');let cost=Math.ceil(D(a,b)/38),br=roadCross(a,b);if(G.roads<cost)return say('Need '+cost+' road tiles.');if(br&&G.bridges<1)return say('This road needs a bridge token.');G.roads-=cost;if(br)G.bridges--;G.links.push({a:a.id,b:b.id,bridge:br});say('Road built. Connected deliveries dispatch automatically.');dispatch()}
function tap(px,py){let h=hit(px,py);if(screen==='menu'){if(h)newGame(h.id);return}if(screen==='over'){if(h&&h.id==='restart')newGame(G.key);if(h&&h.id==='main')screen='menu';return}if(screen!=='play')return;if(h){if(h.id==='tool_pause'){G.paused=!G.paused;say(G.paused?'Paused':'Resumed');return}if(h.id==='tool_road')tool='road';if(h.id==='tool_driver')tool='driver';if(h.id==='tool_bridge'){tool='road';say('Bridge tokens are used automatically when roads cross water.')}if(h.id==='tool_round')tool='round';sel=null;return}let n=near(px,py);if(!n){sel=null;return}if(tool==='driver'){if(n.t!=='hub')return say('Tap a hub to hire a driver.');let cost=55+n.drivers*25;if(G.cash<cost)return say('Need £'+cost+' for a driver.');G.cash-=cost;n.drivers++;n.free++;say(n.n+' hired a driver.');dispatch();return}if(tool==='round'){if(G.rounds<1)return say('No roundabouts left.');if(n.round)return say('Already has a roundabout.');G.rounds--;n.round=true;say('Roundabout added. Traffic moves faster here.');return}if(!sel){sel=n;say('Now tap another place to connect a road.')}else{build(sel,n);sel=null}}
function addPlace(){let t=G.day>38&&Math.random()<.25?'city':G.day>16&&Math.random()<.45?'town':'village',names={village:['Larch End','Beechby','Foxford','Hazel Wick','Brooklet'],town:['Northmarket','Ridgewell','Dockminster','Fernport'],city:['New Carrow','Eastport','Crown City','Silverhaven']}[t],px,py,z=0;do{px=R(45,345);py=R(145,690);z++}while(z<50&&G.nodes.some(n=>Math.hypot(n.x-px,n.y-py)<88));let n=node(t,names[Math.floor(Math.random()*names.length)],px,py);G.nodes.push(n);say(n.n+' appeared on the map.')}
function addHub(){let px,py,z=0;do{px=R(60,330);py=R(160,690);z++}while(z<50&&G.nodes.some(n=>Math.hypot(n.x-px,n.y-py)<105));let h=node('hub','Hub '+(G.nodes.filter(n=>n.t==='hub').length+1),px,py);h.drivers=1;h.free=1;G.nodes.push(h);say('New hub opened. Connect it to the network.')}
function demand(){let a=G.nodes.filter(n=>n.t!=='hub');if(!a.length)return;let n=a[Math.floor(Math.random()*a.length)],amt=n.t==='city'?Math.ceil(R(2,4)):n.t==='town'?Math.ceil(R(1,3)):1;n.demand+=amt;n.due=Math.max(n.due||0,Math.round((n.t==='city'?7:n.t==='town'?6:5)*(G.m.spawn>.45?.82:G.m.spawn>.3?1.05:1.45)));dispatch()}
function path(s,e){let q=[{id:s,path:[s],len:0}],seen=new Set([s]);while(q.length){let cur=q.shift();if(cur.id===e)return cur;let from=G.nodes.find(n=>n.id===cur.id);G.links.filter(r=>r.a===cur.id||r.b===cur.id).forEach(r=>{let id=r.a===cur.id?r.b:r.a;if(seen.has(id))return;seen.add(id);let to=G.nodes.find(n=>n.id===id);q.push({id,path:cur.path.concat(id),len:cur.len+D(from,to)})})}return null}
function bestHub(dest){let best=null;G.nodes.filter(n=>n.t==='hub').forEach(h=>{let p=path(h.id,dest.id);if(p&&(!best||p.len<best.p.len))best={h,p}});return best}
function dispatch(){G.nodes.filter(n=>n.t!=='hub'&&n.demand>0).forEach(n=>{let o=bestHub(n);if(!o)return;while(n.demand>0&&o.h.free>0){o.h.free--;n.demand--;G.trucks.push({path:o.p.path,edge:0,prog:0,hub:o.h.id,dest:n.id,due:n.due||5,age:0,col:Math.floor(Math.random()*4),speed:52});if(n.demand===0)n.due=0}})}
function point(v){let a=G.nodes.find(n=>n.id===v.path[v.edge]),b=G.nodes.find(n=>n.id===v.path[v.edge+1])||a,t=C(v.prog/Math.max(1,D(a,b)),0,1);return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t,a:Math.atan2(b.y-a.y,b.x-a.x)}}
function trucks(dt){for(let i=G.trucks.length-1;i>=0;i--){let v=G.trucks[i];v.age+=dt;let a=G.nodes.find(n=>n.id===v.path[v.edge]),b=G.nodes.find(n=>n.id===v.path[v.edge+1]);if(!a||!b){G.trucks.splice(i,1);continue}let jam=G.trucks.filter(o=>o!==v&&(o.path[o.edge]===v.path[v.edge]||o.path[o.edge+1]===v.path[v.edge+1])).length,boost=(a.round||b.round)?1.28:1;v.prog+=v.speed*boost*dt/(1+jam*.18);if(v.prog>=D(a,b)){v.edge++;v.prog=0;if(v.edge>=v.path.length-1){let h=G.nodes.find(n=>n.id===v.hub);if(h)h.free++;if(v.age>v.due){G.late++;G.cash=Math.max(0,G.cash-20);say('A delivery arrived late.')}else{let rew=22+Math.max(0,Math.round((v.due-v.age)*5));G.cash+=rew;G.score+=rew+G.day}G.trucks.splice(i,1)}}}}
function update(dt){if(screen!=='play'||G.paused)return;if(msgT>0)msgT-=dt;let dd=dt*.24;G.clock+=dd;trucks(dd);if(G.clock>=1){G.clock-=1;G.day++;G.nodes.filter(n=>n.t!=='hub'&&n.demand>0).forEach(n=>{n.due--;if(n.due<=0){G.late+=n.demand;n.demand=0;say('Undelivered orders expired.')}});if(Math.random()<G.m.spawn)demand();if(G.day%7===0){let b=6+Math.floor(G.day/12);G.roads+=b;G.cash+=20;say('Weekly grant: '+b+' road tiles.')}if(G.day%12===0)addPlace();if(G.day%20===0&&G.nodes.filter(n=>n.t==='hub').length<4)addHub();if(G.day%16===0){G.bridges++;say('Bridge token awarded.')}if(G.day%21===0){G.rounds++;say('Roundabout awarded.')}dispatch()}if(G.late>=G.m.late)screen='over'}
function render(){if(screen==='menu')menu();else if(screen==='play')play();else over()}let last=0;function loop(t){let dt=Math.min(.05,(t-last)/1000||.016);last=t;update(dt);render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
c.addEventListener('pointerdown',e=>{let r=c.getBoundingClientRect();P={x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height,down:true}});c.addEventListener('pointermove',e=>{let r=c.getBoundingClientRect();P.x=(e.clientX-r.left)*W/r.width;P.y=(e.clientY-r.top)*H/r.height});c.addEventListener('pointerup',e=>{let r=c.getBoundingClientRect();P.down=false;tap((e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height)});
})();
</script></body></html>
