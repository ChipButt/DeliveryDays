<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#e7eeeb">
<title>Delivery Days</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#dce7e4;touch-action:none;font-family:Arial,Helvetica,sans-serif}#wrap{height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:#dce7e4}canvas{width:min(100vw,calc(100vh*390/844));height:min(100vh,calc(100vw*844/390));display:block;background:#edf3ef;box-shadow:0 20px 70px rgba(30,40,45,.22)}
</style>
</head>
<body><div id="wrap"><canvas id="game" width="390" height="844"></canvas></div>
<script>
(()=>{
const W=390,H=844,cv=document.getElementById('game'),ctx=cv.getContext('2d');let DPR=Math.min(2,devicePixelRatio||1);cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),rnd=(a,b)=>a+Math.random()*(b-a),snap=v=>Math.round(v/26)*26;
const maps={easy:{name:'Gentle Coast',cash:260,tiles:72,drivers:3,lateMax:9,spawn:.28,river:false},normal:{name:'Market County',cash:210,tiles:54,drivers:2,lateMax:7,spawn:.40,river:true},hard:{name:'Bridge District',cash:165,tiles:42,drivers:2,lateMax:5,spawn:.55,river:true}};
let screen='menu',G=null,ui=[],touch=null,message='',messageT=0,edit=false,editTool='build',hubPanel=null,roadStart=null,roadPreview=null,paused=false;
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function text(t,x,y,s=18,c='#33393f',align='left',bold=false){ctx.fillStyle=c;ctx.font=(bold?'700 ':'500 ')+s+'px Arial';ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(t,x,y)}
function wrap(t,x,y,w,s=14,c='#33393f'){ctx.fillStyle=c;ctx.font='500 '+s+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';let words=t.split(' '),line='',yy=y;for(const q of words){let z=line?line+' '+q:q;if(ctx.measureText(z).width>w&&line){ctx.fillText(line,x,yy);yy+=s+5;line=q}else line=z}if(line)ctx.fillText(line,x,yy)}
function button(id,label,x,y,w,h,kind='teal',s=20){ctx.fillStyle=kind==='dark'?'#30363b':kind==='red'?'#ef7168':kind==='pale'?'#f9f8f1':'#93bec0';rr(x,y,w,h,12);ctx.fill();if(kind==='pale'){ctx.strokeStyle='#cbdad6';ctx.lineWidth=2;ctx.stroke()}text(label,x+w/2,y+h/2,s,kind==='pale'?'#30363b':'#fff','center',true);ui.push({id,x,y,w,h})}
function card(x,y,w,h){ctx.fillStyle='rgba(60,70,75,.18)';rr(x+8,y+10,w,h,18);ctx.fill();ctx.fillStyle='#fbfaf4';rr(x,y,w,h,18);ctx.fill();ctx.strokeStyle='#b8d7d5';ctx.lineWidth=3;ctx.stroke()}
function say(t){message=t;messageT=2.6}
function node(type,name,x,y){return{id:Math.random().toString(36).slice(2),type,name,x,y,demand:0,due:0,drivers:0,free:0,loading:0,loadTime:1.35,loadLevel:0,driverLevel:0}}
function start(key){const m=maps[key];G={key,map:m,day:1,clock:0,cash:m.cash,tiles:m.tiles,bridges:m.river?1:0,rounds:1,late:0,score:0,nodes:[],roads:[],trucks:[],spawned:0};let h=node('hub','Central Hub',190,424);h.drivers=m.drivers;h.free=m.drivers;G.nodes.push(h,node('village','Oakmere',88,575),node('town','Ashford',302,605));screen='game';edit=false;paused=false;say('Tap Edit Roads to freeze time and draw your network.');}
function bg(){ctx.fillStyle=edit?'#fff0f0':'#edf3ef';ctx.fillRect(0,0,W,H);ctx.strokeStyle=edit?'rgba(230,80,80,.38)':'rgba(126,169,178,.22)';ctx.lineWidth=1;for(let x=-20;x<W+30;x+=26){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=26){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(0,0,W,H)}
function drawRiver(){if(!G||!G.map.river)return;ctx.save();ctx.strokeStyle='rgba(109,200,225,.72)';ctx.lineWidth=56;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(332,-20);ctx.bezierCurveTo(292,130,366,245,306,360);ctx.bezierCurveTo(235,500,318,646,250,870);ctx.stroke();ctx.strokeStyle='rgba(58,160,188,.28)';ctx.lineWidth=62;ctx.stroke();ctx.restore()}
function riverX(y){return 318-.082*y+39*Math.sin(y/105)}
function crossesRiver(a,b){if(!G.map.river)return false;for(let i=0;i<=20;i++){let t=i/20,x=a.x+(b.x-a.x)*t,y=a.y+(b.y-a.y)*t;if(Math.abs(x-riverX(y))<31)return true}return false}
function drawRoads(){for(const r of G.roads){ctx.save();ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=r.bridge?18:14;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(r.a.x+4,r.a.y+5);ctx.lineTo(r.b.x+4,r.b.y+5);ctx.stroke();ctx.strokeStyle=r.bridge?'#f8e7b3':'#fffdf6';ctx.lineWidth=r.bridge?16:12;ctx.beginPath();ctx.moveTo(r.a.x,r.a.y);ctx.lineTo(r.b.x,r.b.y);ctx.stroke();ctx.strokeStyle='rgba(80,140,145,.75)';ctx.lineWidth=2;ctx.setLineDash([8,9]);ctx.beginPath();ctx.moveTo(r.a.x,r.a.y);ctx.lineTo(r.b.x,r.b.y);ctx.stroke();ctx.restore()}
if(roadPreview){ctx.save();ctx.strokeStyle='rgba(239,113,104,.75)';ctx.lineWidth=8;ctx.setLineDash([10,6]);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(roadStart.x,roadStart.y);ctx.lineTo(roadPreview.x,roadPreview.y);ctx.stroke();ctx.restore()}}
function drawDemandPin(n){if(n.demand<=0)return;let x=n.x,y=n.y-54;ctx.save();ctx.fillStyle=n.due<=2?'#ef7168':'#ffce73';ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.beginPath();ctx.arc(x,y,19,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#33393f';ctx.beginPath();ctx.moveTo(x-7,y-4);ctx.lineTo(x+7,y-4);ctx.lineTo(x+7,y+7);ctx.lineTo(x-7,y+7);ctx.closePath();ctx.fill();ctx.strokeStyle='#33393f';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x-5,y-5);ctx.quadraticCurveTo(x,y-13,x+5,y-5);ctx.stroke();text(String(n.due),x,y+29,12,n.due<=2?'#ef7168':'#33393f','center',true);ctx.restore()}
function drawNode(n){drawDemandPin(n);let s=n.type==='hub'?58:n.type==='city'?54:n.type==='town'?50:46;ctx.save();ctx.translate(n.x,n.y);ctx.fillStyle=n.type==='hub'?'#ffce73':n.type==='city'?'#ef7168':n.type==='town'?'#6e8dd8':'#74c987';ctx.shadowColor='rgba(0,0,0,.18)';ctx.shadowOffsetX=7;ctx.shadowOffsetY=9;ctx.shadowBlur=0;rr(-s/2,-s/2,s,s,12);ctx.fill();ctx.shadowColor='transparent';ctx.fillStyle='rgba(255,255,255,.68)';rr(-s/2+8,-s/2+8,s-16,s-16,8);ctx.fill();ctx.strokeStyle='#33393f';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();if(n.type==='hub'){ctx.moveTo(-15,11);ctx.lineTo(15,11);ctx.lineTo(15,-9);ctx.lineTo(7,-17);ctx.lineTo(-15,-17);ctx.closePath()}else{ctx.arc(0,-7,10,0,Math.PI*2);ctx.moveTo(0,3);ctx.lineTo(0,17)}ctx.stroke();ctx.restore();text(n.name,n.x,n.y+s/2+15,11,'#33393f','center',true);if(n.type==='hub'){text('drivers '+n.free+'/'+n.drivers,n.x,n.y+s/2+29,10,'#667176','center');if(n.loading>0){ctx.fillStyle='rgba(51,57,63,.8)';rr(n.x-24,n.y-s/2-15,48,8,4);ctx.fill();ctx.fillStyle='#93bec0';rr(n.x-24,n.y-s/2-15,48*(1-n.loading/n.loadTime),8,4);ctx.fill()}}}
function drawTruck(t){let p=roadPoint(t);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=t.col;rr(-14,-8,28,16,4);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(5,-6,7,6);ctx.fillStyle='#33393f';ctx.beginPath();ctx.arc(-7,8,3,0,7);ctx.arc(8,8,3,0,7);ctx.fill();ctx.restore()}
function header(){ctx.fillStyle='rgba(251,250,244,.94)';rr(10,10,370,76,18);ctx.fill();text('Day '+G.day,26,35,19,'#33393f','left',true);text('£'+G.cash,105,35,17,'#33393f','left',true);text('Tiles '+G.tiles,178,35,16,'#33393f','left',true);text('Late '+G.late+'/'+G.map.lateMax,281,35,16,G.late>=G.map.lateMax-2?'#ef7168':'#33393f','left',true);button('pause',paused?'Resume':'Pause',26,52,94,26,paused?'teal':'pale',14);button('edit',edit?'Finish Edit':'Edit Roads',132,52,118,26,edit?'red':'pale',14);button('menu','Menu',264,52,82,26,'pale',14)}
function tools(){if(edit){ctx.fillStyle='rgba(251,250,244,.95)';rr(16,748,358,78,18);ctx.fill();button('build','Draw Road',28,762,102,48,editTool==='build'?'teal':'pale',16);button('delete','Delete Road',144,762,112,48,editTool==='delete'?'red':'pale',16);button('bridge','Bridge '+G.bridges,270,762,90,48,'pale',14);text('Time frozen: draw from a place, or delete a road to refund tiles.',195,735,12,'#ef7168','center',true)}else{ctx.fillStyle='rgba(251,250,244,.95)';rr(16,760,358,64,18);ctx.fill();button('hubHint','Tap a hub for driver/loading upgrades',35,773,320,38,'pale',14)}}
function drawHubPanel(){if(!hubPanel)return;let n=hubPanel;card(28,144,334,258);text(n.name,195,172,26,'#33393f','center',true);text('Drivers: '+n.drivers+'  |  Available: '+n.free,195,210,17,'#33393f','center');text('Loading speed: '+Math.max(.35,n.loadTime).toFixed(2)+' days',195,238,16,'#33393f','center');let driverCost=55+n.drivers*30,loadCost=80+n.loadLevel*70;button('buyDriver','Hire Driver £'+driverCost,58,276,274,48,G.cash>=driverCost?'teal':'pale',17);button('buyLoad','Upgrade Loading £'+loadCost,58,337,274,48,G.cash>=loadCost?'teal':'pale',17);button('closeHub','Close',140,414,110,36,'dark',16)}
function drawGame(){ui=[];bg();drawRiver();drawRoads();for(const n of G.nodes)drawNode(n);for(const t of G.trucks)drawTruck(t);header();tools();if(messageT>0){ctx.fillStyle='rgba(51,57,63,.88)';rr(24,100,342,42,16);ctx.fill();text(message,195,121,13,'#fff','center',true)}if(hubPanel)drawHubPanel();if(edit){ctx.strokeStyle='rgba(239,113,104,.9)';ctx.lineWidth=5;ctx.strokeRect(3,3,W-6,H-6)}}
function menu(){ui=[];bg();ctx.fillStyle='#33393f';text('Delivery Days',195,150,41,'#33393f','center',true);ctx.fillStyle='#ffce73';ctx.beginPath();ctx.arc(318,132,8,0,7);ctx.fill();wrap('Survive as many days as possible. Deliver orders before they expire, upgrade hubs, and redraw your road network when the pressure rises.',195,220,320,15);button('easy','Gentle Coast',54,318,282,70,'teal',24);button('normal','Market County',54,410,282,70,'teal',24);button('hard','Bridge District',54,502,282,70,'teal',24);text('Prototype v2: pause, hub upgrades, demand pins, road edit mode',195,758,12,'#667176','center')}
function gameOver(){drawGame();ui=[];ctx.fillStyle='rgba(237,243,239,.78)';ctx.fillRect(0,0,W,H);card(35,225,320,255);text('Game Over',195,270,34,'#33393f','center',true);text('You lasted '+G.day+' days',195,322,22,'#33393f','center');text('Score '+G.score,195,356,20,'#33393f','center',true);let best=Math.max(+(localStorage.deliveryDaysBest||0),G.score);localStorage.deliveryDaysBest=best;text('Best '+best,195,386,16,'#667176','center');button('restart','Restart Map',65,518,260,64,'teal',22);button('main','Main Menu',65,598,260,64,'dark',22)}
function nearestNode(x,y,r=42){let b=null,bd=999;for(const n of G.nodes){let d=Math.hypot(n.x-x,n.y-y);if(d<bd&&d<r){bd=d;b=n}}return b}
function nearestRoad(x,y){let best=null,bd=999;for(const r of G.roads){let ax=r.a.x,ay=r.a.y,bx=r.b.x,by=r.b.y,l2=(bx-ax)**2+(by-ay)**2,t=clamp(((x-ax)*(bx-ax)+(y-ay)*(by-ay))/l2,0,1),px=ax+(bx-ax)*t,py=ay+(by-ay)*t,d=Math.hypot(x-px,y-py);if(d<bd&&d<18){bd=d;best=r}}return best}
function pointFrom(x,y){let n=nearestNode(x,y,46);return n?n:{x:snap(x),y:snap(y),grid:true}}
function samePoint(a,b){return Math.hypot(a.x-b.x,a.y-b.y)<8}
function roadExists(a,b){return G.roads.some(r=>(samePoint(r.a,a)&&samePoint(r.b,b))||(samePoint(r.a,b)&&samePoint(r.b,a)))}
function addRoad(a,b){if(dist(a,b)<20)return say('Draw a longer road segment.');if(roadExists(a,b))return say('That road already exists.');let cost=Math.ceil(dist(a,b)/26),bridge=crossesRiver(a,b);if(G.tiles<cost)return say('Need '+cost+' road tiles.');if(bridge&&G.bridges<1)return say('This segment needs a bridge token.');G.tiles-=cost;if(bridge)G.bridges--;G.roads.push({a:{x:a.x,y:a.y,node:a.id||null},b:{x:b.x,y:b.y,node:b.id||null},cost,bridge});say('Road drawn. Time is still frozen.');dispatch()}
function deleteRoad(x,y){let r=nearestRoad(x,y);if(!r)return say('Tap a road segment to delete it.');G.tiles+=r.cost;if(r.bridge)G.bridges++;G.roads=G.roads.filter(q=>q!==r);say('Road deleted. Tiles refunded.');}
function roadNeighbours(p){let out=[];for(const r of G.roads){if(samePoint(r.a,p))out.push(r.b);else if(samePoint(r.b,p))out.push(r.a)}return out}
function connectedPath(src,dst){let start={x:src.x,y:src.y,node:src.id},end={x:dst.x,y:dst.y,node:dst.id},q=[{p:start,path:[start],len:0}],seen=new Set([start.x+','+start.y]);while(q.length){let cur=q.shift();if(samePoint(cur.p,end))return cur;for(const nb of roadNeighbours(cur.p)){let key=nb.x+','+nb.y;if(seen.has(key))continue;seen.add(key);q.push({p:nb,path:cur.path.concat(nb),len:cur.len+dist(cur.p,nb)})}}return null}
function bestHub(dest){let best=null;for(const h of G.nodes.filter(n=>n.type==='hub')){let p=connectedPath(h,dest);if(p&&h.free>0&&(!best||p.len<best.path.len))best={hub:h,path:p}}return best}
function dispatch(){if(!G)return;for(const dest of G.nodes.filter(n=>n.type!=='hub'&&n.demand>0)){let choice=bestHub(dest);while(choice&&dest.demand>0&&choice.hub.free>0&&choice.hub.loading<=0){choice.hub.free--;dest.demand--;G.trucks.push({pts:choice.path.path,seg:0,prog:0,hub:choice.hub.id,dest:dest.id,due:dest.due||5,age:0,col:['#ef7168','#6e8dd8','#74c987','#ffce73'][Math.floor(Math.random()*4)]});choice.hub.loading=choice.hub.loadTime;if(dest.demand===0)dest.due=0;choice=bestHub(dest)}}}
function roadPoint(t){let a=t.pts[t.seg],b=t.pts[t.seg+1]||a,len=dist(a,b),u=clamp(t.prog/Math.max(1,len),0,1);return{x:a.x+(b.x-a.x)*u,y:a.y+(b.y-a.y)*u,a:Math.atan2(b.y-a.y,b.x-a.x)}}
function updateTrucks(days){for(let i=G.trucks.length-1;i>=0;i--){let t=G.trucks[i],a=t.pts[t.seg],b=t.pts[t.seg+1],len=dist(a,b);t.age+=days;t.prog+=62*days;if(t.prog>=len){t.seg++;t.prog=0;if(t.seg>=t.pts.length-1){let h=G.nodes.find(n=>n.id===t.hub);if(h)h.free++;if(t.age>t.due){G.late++;G.cash=Math.max(0,G.cash-18);say('A delivery arrived late.')}else{let reward=22+Math.round(Math.max(0,t.due-t.age)*5);G.cash+=reward;G.score+=reward+G.day}G.trucks.splice(i,1)}}}}
function addPlace(){let type=G.day>34&&Math.random()<.25?'city':G.day>16&&Math.random()<.5?'town':'village';let names={village:['Larch End','Beechby','Foxford','Hazel Wick','Brooklet'],town:['Northmarket','Ridgewell','Dockminster','Fernport'],city:['New Carrow','Eastport','Crown City','Silverhaven']}[type];let x,y,tries=0;do{x=rnd(48,342);y=rnd(155,690);tries++}while(tries<60&&G.nodes.some(n=>Math.hypot(n.x-x,n.y-y)<78));G.nodes.push(node(type,names[Math.floor(Math.random()*names.length)],x,y));say('New '+type+' appeared: connect it in Edit Roads.');}
function addHub(){let x,y,tries=0;do{x=rnd(60,330);y=rnd(160,690);tries++}while(tries<60&&G.nodes.some(n=>Math.hypot(n.x-x,n.y-y)<100));let h=node('hub','Hub '+(G.nodes.filter(n=>n.type==='hub').length+1),x,y);h.drivers=1;h.free=1;G.nodes.push(h);say('New hub opened. Tap it for upgrades.');}
function spawnDemand(){let arr=G.nodes.filter(n=>n.type!=='hub');if(!arr.length)return;let n=arr[Math.floor(Math.random()*arr.length)],amt=n.type==='city'?Math.ceil(rnd(2,4)):n.type==='town'?Math.ceil(rnd(1,3)):1;n.demand+=amt;n.due=Math.max(n.due||0,n.type==='city'?7:n.type==='town'?6:5);say(n.name+' needs '+n.demand+' delivery'+(n.demand>1?'ies':''));dispatch()}
function tick(dt){if(screen!=='game'||paused||edit)return;if(messageT>0)messageT-=dt;let days=dt*.26;G.clock+=days;for(const h of G.nodes.filter(n=>n.type==='hub'))h.loading=Math.max(0,h.loading-days);updateTrucks(days);dispatch();if(G.clock>=1){G.clock-=1;G.day++;for(const n of G.nodes.filter(n=>n.type!=='hub'&&n.demand>0)){n.due--;if(n.due<=0){G.late+=n.demand;n.demand=0;say('Undelivered orders expired.')}}if(Math.random()<G.map.spawn)spawnDemand();if(G.day%7===0){let add=8+Math.floor(G.day/14);G.tiles+=add;G.cash+=18;say('Weekly grant: '+add+' road tiles and £18.')}if(G.day%12===0)addPlace();if(G.day%20===0&&G.nodes.filter(n=>n.type==='hub').length<4)addHub();if(G.day%16===0)G.bridges++;if(G.day%21===0)G.rounds++;dispatch();}if(G.late>=G.map.lateMax)screen='over'}
function handleButton(id){if(screen==='menu'){start(id);return}if(screen==='over'){if(id==='restart')start(G.key);if(id==='main')screen='menu';return}if(id==='pause'){paused=!paused;say(paused?'Time paused.':'Time resumed.');return}if(id==='edit'){edit=!edit;paused=edit?true:paused;hubPanel=null;roadStart=null;roadPreview=null;say(edit?'Road editing: time frozen, red grid active.':'Road editing closed.');return}if(id==='menu'){screen='menu';return}if(id==='build'){editTool='build';return}if(id==='delete'){editTool='delete';return}if(id==='closeHub'){hubPanel=null;return}if(id==='buyDriver'&&hubPanel){let cost=55+hubPanel.drivers*30;if(G.cash>=cost){G.cash-=cost;hubPanel.drivers++;hubPanel.free++;say('Driver hired.');dispatch()}return}if(id==='buyLoad'&&hubPanel){let cost=80+hubPanel.loadLevel*70;if(G.cash>=cost){G.cash-=cost;hubPanel.loadLevel++;hubPanel.loadTime=Math.max(.35,hubPanel.loadTime*.72);say('Loading speed upgraded.');dispatch()}return}}
function tap(x,y){let h=ui.find(u=>x>=u.x&&x<=u.x+u.w&&y>=u.y&&y<=u.y+u.h);if(h){handleButton(h.id);return}if(screen!=='game')return;if(hubPanel){hubPanel=null;return}if(edit){if(editTool==='delete'){deleteRoad(x,y);return}return}let n=nearestNode(x,y,48);if(n&&n.type==='hub'){hubPanel=n;paused=true;say('Hub management open. Time paused.')}else if(n&&n.demand>0){say(n.name+' has '+n.demand+' pending. Due in '+n.due+' day(s).')}}
function down(x,y){if(screen==='game'&&edit&&editTool==='build'){roadStart=pointFrom(x,y);roadPreview={...roadStart}}}
function move(x,y){if(roadStart&&edit){let p=pointFrom(x,y);let dx=Math.abs(p.x-roadStart.x),dy=Math.abs(p.y-roadStart.y);if(dx>dy)p.y=roadStart.y;else p.x=roadStart.x;roadPreview=p}}
function up(x,y){if(roadStart&&edit&&editTool==='build'){let p=roadPreview||pointFrom(x,y);addRoad(roadStart,p);roadStart=null;roadPreview=null;return}tap(x,y)}
function render(){if(screen==='menu')menu();else if(screen==='game')drawGame();else gameOver()}
let last=0;function loop(t){let dt=Math.min(.05,(t-last)/1000||.016);last=t;tick(dt);render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
function pos(e){let r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}
cv.addEventListener('pointerdown',e=>{touch=pos(e);down(touch.x,touch.y)});cv.addEventListener('pointermove',e=>{let p=pos(e);move(p.x,p.y)});cv.addEventListener('pointerup',e=>{let p=pos(e);up(p.x,p.y);touch=null});
})();
</script></body></html>
